<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修仙世界 - 注册</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>修仙世界</h1>
            <h2>注册</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="密码" required>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="确认密码" required>
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            <p class="auth-link">
                已有账号？<a href="login.html">立即登录</a>
            </p>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
